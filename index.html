<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Astroloji Uygulaması</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            margin: 0;
        }
        .container {
            background: #ffffff;
            border-radius: 28px;
            padding: 30px 24px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .icon {
            font-size: 72px;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1c1c1e;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .sub {
            font-size: 16px;
            color: #6c6c70;
            margin-bottom: 28px;
            line-height: 1.4;
        }
        .indir-btn {
            display: inline-block;
            background: #007aff;
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            padding: 16px 48px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.15s ease;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.25);
            letter-spacing: 0.3px;
            border: none;
            cursor: pointer;
        }
        .indir-btn:active {
            transform: scale(0.96);
            background: #005bbf;
        }
        .meta {
            margin-top: 24px;
            font-size: 14px;
            color: #8e8e93;
            border-top: 1px solid #e5e5ea;
            padding-top: 20px;
        }
        .meta span {
            display: inline-block;
            margin: 0 10px;
        }
        .uyari {
            background: #fff3cd;
            color: #856404;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            margin: 20px 0 10px;
            border-left: 4px solid #ffc107;
            text-align: left;
        }
        /* Mobil ekstra ince ayar */
        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 32px;
            }
            .indir-btn {
                padding: 14px 32px;
                font-size: 18px;
                width: 100%;
            }
            .icon {
                font-size: 60px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✨</div>
        <h1>Astroloji</h1>
        <p class="sub">Günlük burç yorumları, aşk uyumu, kişisel rehber</p>

        <!-- İNDİR BUTONU -->
        <a href="https://raw.githubusercontent.com/astrolojiyasam/astrolojiyasam.github.io/main/astroloji.apk" 
           download="astroloji.apk" 
           class="indir-btn">
           📲 İndir
        </a>

        <div class="meta">
            <span>📦 14 MB</span>
            <span>🤖 Android 5.0+</span>
        </div>

        <div class="uyari">
            ⚠️ İndirdikten sonra dosyaya tıklayarak kuruluma başlayın.<br>
            Telefonunuz "Bilinmeyen kaynak" iznini açmanızı isteyebilir.
        </div>
    </div>
</body>
</html>
