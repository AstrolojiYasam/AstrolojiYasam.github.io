<script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
        console.log('✅ Kurulum butonu aktif.');
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                alert('🎉 Uygulama başarıyla eklendi! Ana ekranda bulabilirsin.');
            } else {
                alert('Kurulum iptal edildi.');
            }
            deferredPrompt = null;
        } else {
            // Eğer beforeinstallprompt çalışmadıysa, manuel ekleme talimatı ver.
            alert('📱 Lütfen Chrome menüsünden "Ana ekrana ekle" seçeneğini kullanın.\n\nAdımlar:\n1. Sağ üstteki 3 noktaya tıkla\n2. "Ana ekrana ekle" seçeneğini bul\n3. "Ekle" de');
        }
    });

    if (window.matchMedia('(display-mode: standalone)').matches) {
        document.getElementById('installBtn').style.display = 'none';
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('✅ Service Worker kaydedildi.'))
            .catch((err) => console.log('⚠️ Service Worker hatası:', err));
    }
</script>
