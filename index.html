<head>bir<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0b1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="ikon-192.png"></head>

<div style="text-align:center; margin-top:30px;">
    <button id="installBtn" style="background:#a78bfa; color:#000; border:none; padding:16px 40px; border-radius:50px; font-weight:bold; font-size:1.2rem; cursor:pointer; box-shadow:0 0 20px rgba(167,139,250,0.3);">
        📲 Uygulamayı Yükle
    </button>
</div>

<script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            if (result.outcome === 'accepted') {
                alert('🎉 Uygulama başarıyla eklendi! Ana ekranda bulabilirsin.');
            } else {
                alert('Kurulum iptal edildi.');
            }
            deferredPrompt = null;
        } else {
            alert('Lütfen Chrome menüsünden "Ana ekrana ekle" seçeneğini kullanın.');
        }
    });

    if (window.matchMedia('(display-mode: standalone)').matches) {
        document.getElementById('installBtn').style.display = 'none';
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('✅ Service Worker kaydedildi.'))
            .catch(() => console.log('⚠️ Service Worker kaydedilemedi.'));
    }
</script>
